<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>MeloDrama — Streaming Drama Pendek</title>
  
  <!-- FIX UTAMA: Mencegah error 403 Forbidden pada video -->
  <meta name="referrer" content="no-referrer">
  
  <script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.13/dist/hls.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --red: #e50914; --bg: #0a0a0a; --surface: #141414; --border: #2a2a2a; --text: #fff; --muted: #999;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); overflow-x: hidden; line-height: 1.5; }
    
    /* Header */
    .header { position: fixed; top: 0; left:0; width: 100%; height: 60px; background: rgba(10,10,10,0.95); backdrop-filter: blur(10px); display: flex; align-items: center; padding: 0 16px; z-index: 100; border-bottom: 1px solid var(--border); }
    .logo { color: var(--red); font-weight: 800; font-size: 22px; cursor: pointer; text-decoration: none; letter-spacing: -1px; }
    .logo span { color: #fff; }

    /* Main */
    .main { padding-top: 80px; padding-bottom: 40px; }
    .section { margin-bottom: 30px; padding: 0 16px; }
    .section-title { font-size: 18px; font-weight: 700; margin-bottom: 15px; display: flex; align-items: center; gap: 8px; }
    
    /* Grid Drama */
    .drama-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 12px; }
    .drama-card { cursor: pointer; transition: transform 0.2s; }
    .drama-card:hover { transform: scale(1.05); }
    .poster-wrap { position: relative; aspect-ratio: 2/3; border-radius: 8px; overflow: hidden; background: #222; }
    .poster-wrap img { width: 100%; height: 100%; object-fit: cover; }
    .ep-tag { position: absolute; bottom: 6px; right: 6px; background: rgba(0,0,0,0.7); font-size: 10px; padding: 2px 6px; border-radius: 4px; }
    .title { font-size: 12px; margin-top: 8px; font-weight: 500; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; color: #ddd; }

    /* Modal Player */
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 200; display: none; flex-direction: column; }
    .modal-overlay.open { display: flex; }
    .player-wrap { width: 100%; aspect-ratio: 16/9; background: #000; position: relative; max-height: 40vh; }
    video { width: 100%; height: 100%; }
    
    .modal-body { flex: 1; overflow-y: auto; padding: 20px; }
    .modal-info { margin-bottom: 20px; }
    .modal-title { font-size: 20px; font-weight: 800; margin-bottom: 4px; }
    .modal-desc { font-size: 13px; color: var(--muted); margin-top: 10px; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }

    .ep-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; margin-top: 20px; }
    .ep-btn { padding: 12px 5px; background: #222; border: 1px solid #333; color: #fff; border-radius: 6px; cursor: pointer; font-size: 14px; font-weight: 600; text-align: center; }
    .ep-btn.active { background: var(--red); border-color: var(--red); }
    
    .close-btn { position: absolute; top: 12px; right: 12px; background: rgba(255,255,255,0.2); color: #fff; border: none; border-radius: 50%; width: 32px; height: 32px; z-index: 210; cursor: pointer; display: flex; align-items: center; justify-content: center; font-weight: bold; }

    /* Loading Spinner */
    .loading-state { padding: 50px; text-align: center; color: var(--muted); }
    .spinner { border: 3px solid #333; border-top: 3px solid var(--red); border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; margin: 0 auto 10px; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  </style>
</head>
<body>

<header class="header">
  <div class="logo" onclick="location.reload()">Melo<span>Drama</span></div>
</header>

<main class="main">
  <div class="section">
    <div class="section-title">🔥 Drama Populer</div>
    <div id="dramaContent" class="drama-grid">
      <div class="loading-state"><div class="spinner"></div> Memuat drama...</div>
    </div>
  </div>
</main>

<!-- MODAL PLAYER -->
<div class="modal-overlay" id="modalOverlay">
  <button class="close-btn" onclick="closeModal()">✕</button>
  
  <div class="player-wrap">
    <video id="mainPlayer" controls playsinline></video>
  </div>
  
  <div class="modal-body">
    <div class="modal-info">
      <div id="mTitle" class="modal-title">Judul Drama</div>
      <div id="mDesc" class="modal-desc">Deskripsi drama...</div>
    </div>
    
    <div style="font-weight: 700; font-size: 14px; color: var(--red);">Daftar Episode</div>
    <div id="epGrid" class="ep-grid"></div>
  </div>
</div>

<script>
  // GUNAKAN API ANDA SENDIRI DISINI (HASIL DEPLOY VERCEL)
  const API_BASE = 'https://reelshort.vercel.app/api'; 
  
  let currentDrama = null;
  let hls = null;

  // 1. Load Data Drama (Foryou)
  async function init() {
    try {
      const res = await fetch(`${API_BASE}/foryou?lang=in`);
      const data = await res.json();
      renderDramas(data.items || []);
    } catch (e) {
      document.getElementById('dramaContent').innerHTML = '<p>Gagal memuat data. Cek koneksi API.</p>';
    }
  }

  // 2. Tampilkan Card Drama
  function renderDramas(items) {
    const container = document.getElementById('dramaContent');
    container.innerHTML = items.map(item => `
      <div class="drama-card" onclick="openDrama('${item.book_id}')">
        <div class="poster-wrap">
          <img src="${item.pic}" alt="poster">
          <div class="ep-tag">${item.chapter_count} Ep</div>
        </div>
        <div class="title">${item.title}</div>
      </div>
    `).join('');
  }

  // 3. Buka Modal & Ambil Detail Episode
  async function openDrama(id) {
    const modal = document.getElementById('modalOverlay');
    modal.classList.add('open');
    document.body.style.overflow = 'hidden';
    
    document.getElementById('epGrid').innerHTML = '<div class="loading-state">Memuat episode...</div>';

    try {
      // Ambil detail lengkap (termasuk deskripsi & daftar episode)
      const res = await fetch(`${API_BASE}/chapters?id=${id}`);
      const data = await res.json();
      
      currentDrama = data;
      document.getElementById('mTitle').innerText = data.title;
      document.getElementById('mDesc').innerText = data.desc || "Tidak ada deskripsi.";
      
      renderEpisodes(data.episodes || []);
      
      // Putar episode pertama otomatis
      if(data.episodes && data.episodes.length > 0) {
        playVideo(0);
      }
    } catch (e) {
      alert("Gagal mengambil detail drama.");
    }
  }

  // 4. Tampilkan Tombol Episode
  function renderEpisodes(eps) {
    const grid = document.getElementById('epGrid');
    grid.innerHTML = eps.map((ep, i) => `
      <button class="ep-btn" id="ep-${i}" onclick="playVideo(${i})">${i + 1}</button>
    `).join('');
  }

  // 5. Fungsi Play Video (HLS)
  function playVideo(index) {
    const ep = currentDrama.episodes[index];
    const video = document.getElementById('mainPlayer');
    const videoUrl = ep.sourceVideoUrl || ep.videoUrl;

    // Update UI tombol aktif
    document.querySelectorAll('.ep-btn').forEach(btn => btn.classList.remove('active'));
    document.getElementById(`ep-${index}`).classList.add('active');

    if (hls) hls.destroy();

    if (Hls.isSupported()) {
      hls = new Hls();
      hls.loadSource(videoUrl);
      hls.attachMedia(video);
      hls.on(Hls.Events.MANIFEST_PARSED, () => video.play());
    } 
    else if (video.canPlayType('application/vnd.apple.mpegurl')) {
      video.src = videoUrl;
      video.play();
    }
  }

  function closeModal() {
    const modal = document.getElementById('modalOverlay');
    const video = document.getElementById('mainPlayer');
    modal.classList.remove('open');
    document.body.style.overflow = '';
    video.pause();
    if (hls) hls.destroy();
  }

  // Jalankan aplikasi
  init();
</script>

</body>
</html>
